name: Backend CI

on:
  push:
    paths:
      - "apps/backend/**"
      - "infrastructure/postgres/**"
      - "compose.yaml"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "apps/backend/**"
      - "infrastructure/postgres/**"
      - "compose.yaml"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install -r apps/backend/requirements.txt
      - name: Run backend unit tests
        run: python -m unittest discover -s apps/backend/tests -v
      - name: Validate Mac deployment script
        run: bash -n scripts/deploy-backend-mac.sh scripts/test-backend.sh

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        env:
          POSTGRES_PASSWORD: ci-url-safe-password
        run: |
          docker compose config --quiet
          docker compose -f compose.mac-server.yaml config --quiet
      - name: Build backend image
        run: docker compose build backend
      - name: Inspect backend image user and health check
        run: |
          test "$(docker image inspect lotto-shop-scanner/backend:local --format '{{.Config.User}}')" = "app"
          test -n "$(docker image inspect lotto-shop-scanner/backend:local --format '{{json .Config.Healthcheck}}')"
