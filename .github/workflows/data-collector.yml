name: Data collector CI

on:
  push:
    paths:
      - "apps/data-collector/**"
      - "compose.yaml"
      - ".github/workflows/data-collector.yml"
  pull_request:
    paths:
      - "apps/data-collector/**"
      - "compose.yaml"
      - ".github/workflows/data-collector.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run unit tests
        run: python -m unittest discover -s apps/data-collector/tests -v

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
      - name: Build data collector image
        run: docker compose build data-collector
