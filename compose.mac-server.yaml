name: lotto-shop-scanner

services:
  postgres:
    image: postgis/postgis:17-3.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lotto}
      POSTGRES_USER: ${POSTGRES_USER:-lotto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./apps/backend
    image: lotto-shop-scanner/backend:mac-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lotto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lotto}
      PORT: 8000
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      NAVER_GEOCODE_CLIENT_ID: ${NAVER_GEOCODE_CLIENT_ID:-}
      NAVER_GEOCODE_CLIENT_SECRET: ${NAVER_GEOCODE_CLIENT_SECRET:-}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN must be set}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      backend:
        condition: service_healthy

  db-loader:
    build:
      context: ./apps/data-collector
    image: lotto-shop-scanner/data-collector:mac-server
    entrypoint: ["python", "src/load_rankings_to_postgres.py"]
    command:
      - --shops
      - /app/output/winning_shops.jsonl
      - --draw-results
      - /app/output/draw_results.jsonl
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lotto}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lotto}
    volumes:
      - ./apps/data-collector/output:/app/output:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["tools"]

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
